spring.application.name=Task03
spring.datasource.url=jdbc:mysql://localhost:3306/task_03?createDatabaseIfNotExist=true

# Replace with your MySQL username (default is usually 'root')
spring.datasource.username=root

# Replace with your MySQL password
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate auto-table creation and SQL logging
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true